<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ras-cal.com</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
  }

  #pdf-wrapper {
    position: relative;
    width: 100%;
    height: 100%;
  }

  #pdf-canvas {
    position: absolute;
    display: block;
  }

  .annotationLayer {
    position: absolute;
    pointer-events: auto;
  }

  .annotationLayer a {
    border: none;
    text-decoration: underline;
    color: #00f;
    background: transparent;
    cursor: pointer;
    position: absolute;
    display: block;
  }

  /* NEW: text layer */
  #text-layer {
    position: absolute;
    pointer-events: none; /* lets links still work */
  }

  .textLayer span {
    position: absolute;
    white-space: pre;
    transform-origin: center;
    animation: breathe 3s ease-in-out infinite;
    will-change: transform;
  }

  @keyframes breathe {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.04); }
    100% { transform: scale(1); }
  }
</style>
</head>

<body>
<div id="pdf-wrapper">
  <canvas id="pdf-canvas"></canvas>
  <div id="text-layer" class="textLayer"></div>
  <div id="annotation-layer" class="annotationLayer"></div>
</div>

<script src="pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'pdf.worker.min.js';

const url = 'cover.pdf';
const canvas = document.getElementById('pdf-canvas');
const ctx = canvas.getContext('2d');
const annotationLayer = document.getElementById('annotation-layer');
const textLayerDiv = document.getElementById('text-layer');
const wrapper = document.getElementById('pdf-wrapper');

async function renderPDF() {
  const pdf = await pdfjsLib.getDocument(url).promise;
  const page = await pdf.getPage(1);

  const viewport = page.getViewport({ scale: 1 });
  const scale = Math.min(
    wrapper.clientWidth / viewport.width,
    wrapper.clientHeight / viewport.height
  );
  const scaled = page.getViewport({ scale });

  // Canvas size
  canvas.width = scaled.width;
  canvas.height = scaled.height;

  const canvasLeft = (wrapper.clientWidth - scaled.width) / 2;
  const canvasTop = (wrapper.clientHeight - scaled.height) / 2;

  canvas.style.left = canvasLeft + 'px';
  canvas.style.top = canvasTop + 'px';
  canvas.style.width = scaled.width + 'px';
  canvas.style.height = scaled.height + 'px';

  // Text layer positioning
  textLayerDiv.style.width = scaled.width + 'px';
  textLayerDiv.style.height = scaled.height + 'px';
  textLayerDiv.style.left = canvasLeft + 'px';
  textLayerDiv.style.top = canvasTop + 'px';
  textLayerDiv.innerHTML = '';

  // Annotation layer
  annotationLayer.style.width = scaled.width + 'px';
  annotationLayer.style.height = scaled.height + 'px';
  annotationLayer.style.left = canvasLeft + 'px';
  annotationLayer.style.top = canvasTop + 'px';
  annotationLayer.innerHTML = '';

  // Render canvas
  await page.render({ canvasContext: ctx, viewport: scaled }).promise;

  // ✅ Render TEXT LAYER (this is the key)
  const textContent = await page.getTextContent();

  pdfjsLib.renderTextLayer({
    textContent,
    container: textLayerDiv,
    viewport: scaled,
    textDivs: []
  });

  // Render links
  const annotations = await page.getAnnotations({ intent: 'display' });
  annotations.forEach(ann => {
    if (ann.subtype === 'Link' && ann.url) {
      const rect = pdfjsLib.Util.normalizeRect(ann.rect);
      const a = document.createElement('a');

      a.href = ann.url;
      a.rel = 'noopener noreferrer';

      a.style.left = rect[0] * scale + 'px';
      a.style.top = (scaled.height - rect[3] * scale) + 'px';
      a.style.width = (rect[2] - rect[0]) * scale + 'px';
      a.style.height = (rect[3] - rect[1]) * scale + 'px';

      annotationLayer.appendChild(a);
    }
  });
}

// Initial render
renderPDF();

window.addEventListener('resize', renderPDF);
window.addEventListener('orientationchange', renderPDF);
</script>
</body>
</html>
